name: Bot Traffic CDP Runner

on:
  schedule:
    - cron: "0 4 * * *"  # Runs Part 1 at 4:00 AM UTC
    - cron: "0 8 * * *"  # Runs Part 2 at 8:00 AM UTC (4 hours later)
  workflow_dispatch:

permissions:
  contents: read
  actions: write # Needed to save to cache

concurrency:
  group: bot-traffic-cdp
  cancel-in-progress: false

jobs:
  run-bot-traffic:
    name: Run bot traffic through Chrome CDP
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CHROME_CDP: http://127.0.0.1:9222
      DISPLAY: ":99"
      ANALYTICS_FLUSH_MS: "10000"
      BOT_LOCALE: en-US
      BOT_TIMEZONE: America/New_York
      BOT_VIEWPORT_WIDTH: "1365"
      BOT_VIEWPORT_HEIGHT: "900"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}  # <--- INJECTED SECRET HERE

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- NEW: Restore the database from the previous run ---
      - name: Restore SQLite Database Cache
        uses: actions/cache/restore@v4
        with:
          path: database.db
          key: bot-db-${{ github.run_id }}
          restore-keys: |
            bot-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Google Chrome Stable
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl fonts-liberation gnupg xauth xvfb
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Configure browser user agent
        shell: bash
        run: |
          set -euo pipefail
          chrome_version="$(google-chrome-stable --version | awk '{print $3}')"
          chrome_major="${chrome_version%%.*}"
          echo "BOT_USER_AGENT=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chrome_major}.0.0.0 Safari/537.36" >> "${GITHUB_ENV}"

      - name: Start virtual display
        shell: bash
        run: |
          set -euo pipefail
          Xvfb "${DISPLAY}" -screen 0 1920x1080x24 -ac -nolisten tcp > "${RUNNER_TEMP}/xvfb.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/xvfb.pid"
          sleep 2

      - name: Start Chrome with CDP enabled
        shell: bash
        run: |
          set -euo pipefail
          chrome_profile="${RUNNER_TEMP}/chrome-profile"
          chrome_log="${RUNNER_TEMP}/chrome-cdp.log"
          mkdir -p "${chrome_profile}"
          google-chrome-stable \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --remote-debugging-address=127.0.0.1 \
            --remote-debugging-port=9222 \
            --user-data-dir="${chrome_profile}" \
            --window-size=1365,900 \
            --no-first-run \
            --no-default-browser-check \
            --disable-extensions \
            --disable-component-extensions-with-background-pages \
            --disable-popup-blocking \
            --no-proxy-server \
            --disable-features=SubresourceFilter,TrackingProtection3pcd \
            about:blank > "${chrome_log}" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/chrome.pid"
          for _ in {1..30}; do
            if curl -fsS "${CHROME_CDP}/json/version" > "${RUNNER_TEMP}/chrome-version.json"; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Verify analytics endpoints are reachable
        shell: bash
        run: |
          set -euo pipefail
          urls=(
            "https://www.googletagmanager.com/gtag/js?id=G-TEST"
            "https://www.google-analytics.com/g/collect"
            "https://app.posthog.com/capture/"
            "https://us.i.posthog.com/capture/"
            "https://eu.i.posthog.com/capture/"
          )
          for url in "${urls[@]}"; do
            code="$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 20 --max-time 30 "${url}" || true)"
            if [ "${code}" = "000" ]; then
              exit 1
            fi
          done

      - name: Verify target site is reachable
        shell: bash
        run: |
          set -euo pipefail
          target_url="$(python -c 'from config import BASE_URL; print(BASE_URL)')"
          code="$(curl -L -sS -o /dev/null -w '%{http_code}' --connect-timeout 20 --max-time 60 "${target_url}" || true)"
          if [ "${code}" = "000" ]; then
            exit 1
          fi

      - name: Probe analytics through Chrome CDP
        run: python scripts/analytics_cdp_probe.py --output analytics-probe.json --screenshot analytics-probe.png --strict

      # ---------------------------------------------------------
      # DYNAMIC EXECUTION: Routes to Part 1 or Part 2 based on time
      # ---------------------------------------------------------
      - name: Run bot traffic (Part 1 - Bounces & Discovery)
        if: github.event.schedule == '0 4 * * *'
        run: python main_part1.py

      - name: Run bot traffic (Part 2 - Carts & Checkouts)
        if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
        run: python main_part2.py
      # ---------------------------------------------------------

      # --- NEW: Save the updated database for the next run ---
      - name: Save SQLite Database Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: database.db
          key: bot-db-${{ github.run_id }}

      - name: Stop Chrome
        if: always()
        shell: bash
        run: |
          if [ -f "${RUNNER_TEMP}/chrome.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/chrome.pid")" 2>/dev/null || true
          fi
          if [ -f "${RUNNER_TEMP}/xvfb.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/xvfb.pid")" 2>/dev/null || true
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-traffic-diagnostics
          path: |
            ${{ runner.temp }}/chrome-cdp.log
            ${{ runner.temp }}/chrome-version.json
            ${{ runner.temp }}/xvfb.log
            analytics-probe.json
            analytics-probe.png
            debug_timeout_*.png
            login_failure.png
          if-no-files-found: ignore
          retention-days: 7
